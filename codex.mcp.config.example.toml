# Copy this into the MCP host configuration. npx downloads the package on first
# launch and reuses its cache afterwards; no global npm install is required.
# The session JSON contains browser credentials and is stored under the user's
# TAPD MCP data directory by default, never in this configuration file.
# TAPD session cookies and dsc_token are acquired through tapd_refresh_session
# and are never configured here.

[mcp_servers.tapd]
command = "npx"
args = ["-y", "@zhang180031/tapd-mcp"]

[mcp_servers.tapd.env]
TAPD_WEB_BASE_URL = "https://www.tapd.cn"
TAPD_MAX_REQUESTS_PER_MINUTE = "60"
TAPD_REQUEST_TIMEOUT_MS = "20000"
# Optional overrides. If prompt.md is missing or empty, TAPD MCP still starts
# with protocol/safety rules only. Keep session.json private.
# TAPD_DATA_DIR = "/absolute/path/to/tapd-mcp-data"
# TAPD_USER_PROMPT_PATH = "/absolute/path/to/tapd-mcp-data/prompt.md"
# TAPD_SESSION_STORE_PATH = "/absolute/path/to/tapd-mcp-data/session.json"
